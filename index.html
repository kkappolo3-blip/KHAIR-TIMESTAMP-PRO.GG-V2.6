<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHAIR TIMESTAMP PRO.GG V2.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; }
        .btn-pink { background-color: #F44265 !important; color: white !important; }
        .rounded-friendly { border-radius: 2rem; }
        #map { height: 300px; width: 100%; border-radius: 1.5rem; z-index: 1; border: 4px solid #fff; }
        .wm-box { position: absolute; bottom: 0; left: 0; background: rgba(0,0,0,0.8); color: white; padding: 15px 20px; width: 100%; display: flex; justify-content: space-between; align-items: center; z-index: 50; min-height: 140px; }
        .wm-minimap { width: 100px; height: 100px; border: 2px solid white; flex-shrink: 0; overflow: hidden; }
        .btn-desa { background: white; border: 1px solid #ddd; padding: 6px; border-radius: 8px; font-size: 9px; font-weight: bold; text-align: center; cursor: pointer; transition: 0.2s; }
        .btn-desa:hover { background: #fef2f2; border-color: #F44265; color: #F44265; }
        .section-title { font-size: 10px; font-weight: 900; color: #666; margin-bottom: 8px; margin-top: 12px; border-left: 3px solid #F44265; padding-left: 8px; text-transform: uppercase; }
        #tempMapCanvas { position: absolute; left: -9999px; width: 300px; height: 300px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app-content" class="max-w-7xl mx-auto hidden">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-friendly shadow-sm">
            <div>
                <h1 class="text-3xl font-extrabold text-pink-600">TIMESTAMP PRO.GG V2.6</h1>
                <p class="text-gray-500 text-sm font-semibold">Bripka Mohamad Khair • Polsek Tolinggula</p>
            </div>
            <div id="gpsStatus" class="px-5 py-2 rounded-full text-xs font-bold bg-amber-100 text-amber-700 border border-amber-200 uppercase">GPS: MENCARI...</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6 bg-white p-6 rounded-friendly shadow-lg">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="document.getElementById('fileInput').click()" class="py-4 bg-gray-100 rounded-2xl text-xs font-black">BUKA GALERI</button>
                    <button onclick="openCamera()" class="py-4 btn-pink rounded-2xl text-xs font-black shadow-md">BUKA KAMERA</button>
                </div>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFile(event)">
                <div id="map"></div>
                <textarea id="locAddress" class="w-full p-4 bg-gray-50 rounded-2xl text-xs font-bold h-20 border-none" placeholder="Alamat..."></textarea>
                
                <div class="p-4 bg-pink-50 rounded-2xl border border-pink-100">
                    <input type="datetime-local" id="manualTime" class="w-full p-3 rounded-xl border-none text-sm font-bold shadow-sm mb-3">
                    <button onclick="updateTimestampOnly()" class="w-full py-3 bg-pink-600 text-white rounded-xl text-[10px] font-black uppercase shadow-md mb-2">Update Jam Laporan</button>
                    
                    <div class="max-h-[200px] overflow-y-auto pr-2 mt-4">
                        <div class="section-title">Kecamatan Tolinggula</div>
                        <div class="grid grid-cols-2 gap-2">
                            <div onclick="setDesa('ILOMANGGA', 'TOLINGGULA', 'GORONTALO UTARA')" class="btn-desa">ILOMANGGA</div>
                            <div onclick="setDesa('MOLANGGA', 'TOLINGGULA', 'GORONTALO UTARA')" class="btn-desa">MOLANGGA</div>
                            <div onclick="setDesa('TOLITE JAYA', 'TOLINGGULA', 'GORONTALO UTARA')" class="btn-desa">TOLITE JAYA</div>
                            <div onclick="setDesa('LIMBATO', 'TOLINGGULA', 'GORONTALO UTARA')" class="btn-desa">LIMBATO</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-4">
                <div id="exportArea" class="relative overflow-hidden rounded-3xl bg-slate-900 aspect-video shadow-xl">
                    <img id="previewImg" src="" class="w-full h-full object-cover hidden">
                    <div id="watermarkBox" class="wm-box" style="display: none;">
                        <div class="wm-content" style="flex-grow: 1; margin-right: 20px;">
                            <span id="wmTitle" class="block font-black text-2xl uppercase tracking-tighter text-white leading-none mb-1">TOLINGGULA</span>
                            <span id="wmAddress" class="block text-[10px] font-bold leading-tight mb-4 text-white uppercase opacity-90">Gorontalo, Indonesia</span>
                            <div class="flex flex-col gap-1">
                                <div class="flex gap-4">
                                    <span class="text-sm font-black text-white uppercase">LAT: <span id="wmLat" class="font-mono">0.00°</span></span>
                                    <span class="text-sm font-black text-white uppercase">LONG: <span id="wmLng" class="font-mono">0.00°</span></span>
                                </div>
                                <div class="mt-2 border-t border-white/30 pt-2">
                                    <span id="wmTime" class="text-base font-black text-white tracking-widest uppercase">--/--/---- --.--</span>
                                </div>
                            </div>
                        </div>
                        <div class="wm-minimap">
                            <img id="mapSnapshot" class="w-full h-full object-cover" src="">
                        </div>
                    </div>
                </div>
                <button onclick="downloadImage()" id="downloadBtn" class="w-full py-6 btn-pink rounded-friendly font-black text-2xl shadow-2xl">SIMPAN FOTO</button>
            </div>
        </div>
    </div>

    <div id="cropModal" class="fixed inset-0 bg-black/90 z-[9999] hidden flex flex-col items-center justify-center p-4">
        <div class="bg-white rounded-3xl overflow-hidden max-w-2xl w-full flex flex-col">
            <div class="p-4 border-b font-black text-center text-xs text-gray-400 uppercase">SESUAIKAN BINGKAI</div>
            <div class="p-2 bg-gray-800 flex-grow"><img id="cropTarget" style="max-height: 60vh; width: auto; margin: auto;"></div>
            <div class="p-6 grid grid-cols-2 gap-4 bg-white">
                <button onclick="closeCrop()" class="py-4 bg-gray-200 rounded-2xl font-bold text-gray-700">BATAL</button>
                <button onclick="applyCrop()" class="py-4 btn-pink rounded-2xl font-black uppercase text-white shadow-lg">GUNAKAN</button>
            </div>
        </div>
    </div>

    <div id="camModal" class="fixed inset-0 bg-black z-[9999] hidden flex flex-col items-center justify-center">
        <video id="video" class="max-w-full max-h-[70vh] rounded-2xl" autoplay playsinline></video>
        <div class="mt-8 flex gap-6">
            <button onclick="closeCamera()" class="px-10 py-4 bg-white/20 text-white rounded-full font-bold">BATAL</button>
            <button onclick="capturePhoto()" class="px-12 py-4 btn-pink rounded-full font-black text-xl">JEPRET</button>
        </div>
    </div>

    <div id="tempMapCanvas"></div>

    <script>
        // --- KONFIGURASI PENGAMAN TRIAL 3X ---
        const DATABASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRhN7L1SHij58qPECs51lIPyYf-ifqudFiBvc4zw9z_27MjhzcLDEZQAkzqT-I6Ipbk3gEKmDBrUht/pub?output=csv";

        // Fungsi Buka Aplikasi (Tanpa Syarat di Awal)
        function cekAkses() {
            document.getElementById('app-content').classList.remove('hidden');
            initMap();
        }

        // Fungsi Hitung Trial (Dipicu saat Klik Simpan Foto)
        async function proteksiSimpan() {
            if (localStorage.getItem("khair_pro_aktif") === "true") return true;

            let hitung = parseInt(localStorage.getItem("khair_trial_count") || 0);

            if (hitung >= 3) {
                const inputUser = prompt("⚠️ MASA TRIAL HABIS (3/3)\nMasukkan Nama Trakteer Anda untuk Aktivasi Permanen:");
                if (!inputUser) return false;

                try {
                    const res = await fetch(DATABASE_URL);
                    const data = await res.text();
                    if (data.toLowerCase().includes(inputUser.trim().toLowerCase())) {
                        localStorage.setItem("khair_pro_aktif", "true");
                        alert("AKTIVASI BERHASIL! Selamat bertugas, Komandan.");
                        return true;
                    } else {
                        alert("Nama tidak terdaftar.");
                        return false;
                    }
                } catch (e) {
                    alert("Koneksi Error.");
                    return false;
                }
            }

            hitung++;
            localStorage.setItem("khair_trial_count", hitung);
            console.log("Sisa jatah trial: " + (3 - hitung));
            return true;
        }

        // --- LOGIKA UTAMA ---
        let map, marker, cropper;

        async function downloadImage() {
            const ijin = await proteksiSimpan();
            if (!ijin) return;

            html2canvas(document.getElementById('exportArea'), { scale: 3, useCORS: true }).then(canvas => {
                const a = document.createElement('a');
                a.download = `LDP_KHAIR_${Date.now()}.jpg`;
                a.href = canvas.toDataURL('image/jpeg', 0.95);
                a.click();
            });
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([0.9813, 122.2187], 15);
            L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
            marker = L.marker([0.9813, 122.2187], {draggable: true}).addTo(map);
            
            map.on('click', e => updateLocation(e.latlng));
            marker.on('dragend', e => updateLocation(marker.getLatLng()));

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    updateLocation(coords);
                    map.setView(coords, 18);
                    document.getElementById('gpsStatus').innerText = 'GPS: TERKUNCI';
                }, null, { enableHighAccuracy: true });
            }
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('manualTime').value = now.toISOString().slice(0, 16);
        }

        async function updateLocation(coords) {
            marker.setLatLng(coords);
            document.getElementById('wmLat').innerText = `${coords.lat.toFixed(6)}°`;
            document.getElementById('wmLng').innerText = `${coords.lng.toFixed(6)}°`;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coords.lat}&lon=${coords.lng}&addressdetails=1`);
                const data = await res.json();
                document.getElementById('locAddress').value = data.display_name;
                document.getElementById('wmAddress').innerText = data.display_name;
                const a = data.address;
                document.getElementById('wmTitle').innerText = (a.village || a.suburb || "Tolinggula") + ", " + (a.city_district || "");
                renderMiniMap(coords);
            } catch (e) {}
        }

        function setDesa(desa, kec, kab) {
            document.getElementById('wmTitle').innerText = `${desa}, ${kec}`;
            document.getElementById('wmAddress').innerText = `Desa ${desa}, Kec. ${kec}, Kab. ${kab}, Gorontalo, Indonesia`;
            document.getElementById('locAddress').value = `Desa ${desa}, Kec. ${kec}, Kab. ${kab}`;
        }

        function renderMiniMap(coords) {
            const temp = document.getElementById('tempMapCanvas');
            temp.innerHTML = '<div id="actualTemp" style="width:250px;height:250px;"></div>';
            const tMap = L.map('actualTemp', {zoomControl: false, attributionControl: false}).setView(coords, 16);
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(tMap);
            L.marker(coords).addTo(tMap);
            setTimeout(() => {
                html2canvas(document.getElementById('actualTemp'), { useCORS: true }).then(canvas => {
                    document.getElementById('mapSnapshot').src = canvas.toDataURL();
                });
            }, 1200);
        }

        function updateTimestampOnly() {
            const val = document.getElementById('manualTime').value;
            if(!val) return;
            const d = new Date(val);
            const dateStr = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
            let timeStr = d.toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }).replace(':', '.');
            document.getElementById('wmTime').innerText = `${dateStr} ${timeStr} GMT +08.00`;
        }

        function handleFile(e) {
            const r = new FileReader();
            r.onload = () => startCrop(r.result);
            r.readAsDataURL(e.target.files[0]);
        }

        function startCrop(src) {
            document.getElementById('cropTarget').src = src;
            document.getElementById('cropModal').classList.remove('hidden');
            if(cropper) cropper.destroy();
            cropper = new Cropper(document.getElementById('cropTarget'), { 
                aspectRatio: 16/9, viewMode: 2, autoCropArea: 1 
            });
        }

        function applyCrop() {
            const res = cropper.getCroppedCanvas({ width: 1600 }).toDataURL('image/jpeg', 0.9);
            document.getElementById('previewImg').src = res;
            document.getElementById('previewImg').classList.remove('hidden');
            document.getElementById('watermarkBox').style.display = 'flex';
            updateTimestampOnly();
            closeCrop();
        }

        function closeCrop() { document.getElementById('cropModal').classList.add('hidden'); }
        async function openCamera() {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
            document.getElementById('video').srcObject = s;
            document.getElementById('camModal').classList.remove('hidden');
        }
        function closeCamera() {
            document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('camModal').classList.add('hidden');
        }
        function capturePhoto() {
            const v = document.getElementById('video');
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            startCrop(c.toDataURL('image/jpeg'));
            closeCamera();
        }

        window.onload = cekAkses;
    </script>
</body>
</html>
